<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Search Tool – INIZIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Google <strong>Search Tool</strong></span>
      </div>
      <p class="brand-sub">Zadejte klíčové slovní spojení a získejte organické výsledky z první strany Googlu</p>
    </div>
  </header>

  <main class="main">

    <!-- SEARCH BOX -->
    <section class="search-box">
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="searchInput"
          type="text"
          placeholder="např. PHP developer Praha, SEO nástroje zdarma..."
          autocomplete="off"
        />
        <button id="searchBtn" onclick="handleSearch()">
          Hledat
        </button>
      </div>
    </section>

    <!-- STATUS / LOADING -->
    <div id="status" class="status hidden"></div>

    <!-- RESULTS -->
    <section id="resultsSection" class="results-section hidden">
      <div class="results-header">
        <span id="resultsCount"></span>
        <div class="export-buttons">
          <button class="btn-export" onclick="exportJSON()">
            ⬇ Stáhnout JSON
          </button>
          <button class="btn-export btn-export--csv" onclick="exportCSV()">
            ⬇ Stáhnout CSV
          </button>
        </div>
      </div>
      <div id="resultsList"></div>
    </section>

  </main>

  <footer class="footer">
    Vytvořil <strong>David Byrtus</strong> · Zadání pro INIZIO Internet Media s.r.o.
  </footer>

  <script src="app.js"></script>
</body>
</html>
